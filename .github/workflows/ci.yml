name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Install dependencies
        run: go mod tidy

      - name: Build loglint binary
        run: go build -o bin/loglint ./analyzer

      - name: Make loglint executable
        run: chmod +x bin/loglint

      - name: Run tests
        run: go test ./analyzer -v

      - name: Run analyzer via go vet
        run: go vet -vettool=bin/loglint ./...

      - name: Lint config
        run: cat loglint.yaml